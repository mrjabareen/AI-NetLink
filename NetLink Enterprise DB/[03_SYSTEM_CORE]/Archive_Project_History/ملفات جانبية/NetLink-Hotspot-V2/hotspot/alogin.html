<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="2; url=$(link-status)">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>NetLink - تم الدخول</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        function startRedirect() {
            setTimeout(function(){
                location.href = "$(link-status)";
            }, 2000);
        }
    </script>
    <style>
        .success-box { text-align: center; margin-top: 100px; }
        .success-card { 
            background: white; border-radius: 20px; padding: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block;
            border-bottom: 5px solid var(--green);
        }
        .check-icon { font-size: 50px; color: var(--green); margin-bottom: 20px; }
    </style>
</head>
<body onload="startRedirect()">

<div class="container">
    <div class="success-box">
        <div class="success-card">
            <div class="logo-area" style="margin-bottom: 20px;">NETLINK</div>
            <div class="check-icon">✓</div>
            <h2 style="color: #333;">تم تسجيل دخولك بنجاح!</h2>
            <p style="color: #666; margin-top: 10px;">استمتع بإنترنت سريع وغير محدود..</p>
            
            <p style="margin-top: 25px; font-size: 13px; color: #aaa;">
                جاري توجيهك لصفحة الحالة خلال لحظات...
            </p>
        </div>
    </div>
</div>

</body>
</html>
