<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    $(if http-status == 302)Hotspot login required$(endif)
    $(if http-header == "Location")$(link-redirect)$(endif)
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetLink - جاري التحويل</title>
    <meta http-equiv="refresh" content="0; url=$(link-redirect)">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .redirect-box {
            text-align: center;
            margin-top: 100px;
            padding: 20px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--blue);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="redirect-box">
        <div class="logo-area" style="margin-bottom: 30px;">NETLINK</div>
        <div class="loader"></div>
        <h2 style="color: #333;">لحظات من فضلك..</h2>
        <p style="color: #888;">جاري تحويلك لصفحة تسجيل الدخول</p>
        
        <br>
        <p style="font-size: 12px; color: #bbb;">إذا لم يتم التحويل تلقائياً، <a href="$(link-redirect)" style="color: var(--blue);">اضغط هنا</a></p>
    </div>
</div>

</body>
</html>
